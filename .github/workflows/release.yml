name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/next-disable-adminbar-hover
          rsync -av --exclude='.git' --exclude='.github' . /tmp/next-disable-adminbar-hover/
          cd /tmp
          zip -r $GITHUB_WORKSPACE/next-disable-adminbar-hover-${{ steps.version.outputs.VERSION }}.zip next-disable-adminbar-hover

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          files: next-disable-adminbar-hover-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
